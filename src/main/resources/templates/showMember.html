<!DOCTYPE html>
<html xmlns:th="www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <title>[[${title}]]</title>
    <style>
        td {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <h1>회원정보</h1>
    <!--  완료메시지 출력 할 영역  -->
    <!--  model에서 보낸 message가 비어있지 않으면  -->
    <div th:if="${message}">
        <div class="alert alert-warning alert-dismissible fade show" role="alert">
            [[ ${message} ]]
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    </div>
    <table border="1" >
        <thead>
            <tr>
                <td>ID</td>
                <td>이름</td>
                <td>나이</td>
                <td>주소</td>
                <td>수정</td>
                <td>삭제</td>
            </tr>
        </thead>
        <tbody>
            <tr th:each="member : ${lists}" th:object="${member}">
                <td th:text="*{id}">1</td>
                <td th:text="*{name}">장원영</td>
                <td th:text="*{age}">20</td>
                <td th:text="*{address}">서울</td>
                <td>
                    <form  th:action="@{/member/update}" method="get">
                        <input type="hidden"  name="updateId"  th:value="*{id}">
                        <input type="submit" value="수정">
                    </form>
                </td>
                <td>
                    <form th:action="@{/member/delete}" method="post">
                        <input type="hidden"  name="deleteId"  th:value="*{id}">
                        <input type="submit" value="삭제">
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
    <br>
    <form th:action="@{/member/insertForm}" method="get">
        <input type="submit" value="신규회원입력">
    </form>
    <br>
    <form>
        <select name="type">
            <option value="">검색 조건 선택</option>
            <option value="name">이름</option>
            <option value="address">주소</option>
        </select>
        <input type="text" name="keyword">
        <input type="submit" value="검색">
    </form>
</body>
</html>
