<!DOCTYPE html>
<html xmlns:th="www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원등록</title>
</head>
<body>
    <h1>회원수정</h1>
    <form th:action="@{/member/update}" method="post" th:object="${dto}">
        <input type="hidden" name="id" th:value="*{id}">
        <div>
            <label>ID : <span th:text="*{id}"></span></label>
        </div>
        <div>
            <label>이름</label>
            <input type="text" th:field="*{name}">
        </div>
        <div>
            <label>나이</label>
            <input type="number" min="0" max="120" th:field="*{age}">
        </div>
        <div>
            <label>주소</label>
            <input type="text" th:field="*{address}">
        </div>
        <input type="submit" value="수정">
    </form>
    <a th:href="@{/member/view}">목록으로 돌아가기</a>
</body>
</html>
